name: Deploy Verification

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Deployment Readiness Check ───────────────────────────────────────────
  deploy-ready:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deployment files
        run: |
          echo "### 🚀 Deployment Readiness Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check required files
          [ -f "server/Dockerfile" ] && echo "✅ Backend Dockerfile found" >> $GITHUB_STEP_SUMMARY || echo "❌ Backend Dockerfile missing" >> $GITHUB_STEP_SUMMARY
          [ -f "docker-compose.yml" ] && echo "✅ docker-compose.yml found" >> $GITHUB_STEP_SUMMARY || echo "⚠️  docker-compose.yml missing" >> $GITHUB_STEP_SUMMARY
          [ -f "server/.env.example" ] && echo "✅ Backend .env.example found" >> $GITHUB_STEP_SUMMARY || echo "❌ Backend .env.example missing" >> $GITHUB_STEP_SUMMARY
          [ -f "README.md" ] && echo "✅ README.md found" >> $GITHUB_STEP_SUMMARY || echo "⚠️  README.md missing" >> $GITHUB_STEP_SUMMARY

  # ─── Environment Configuration Check ──────────────────────────────────────
  env-config:
    name: Environment Configuration Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate environment files
        run: |
          echo "### ⚙️ Environment Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check backend env
          if [ -f "server/.env.example" ]; then
            echo "Backend environment variables:" >> $GITHUB_STEP_SUMMARY
            grep -E "^[A-Z_]+=" server/.env.example | wc -l | xargs -I {} echo "  {} variables found" >> $GITHUB_STEP_SUMMARY
          fi

          # Check required vars
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Required variables status:" >> $GITHUB_STEP_SUMMARY
          grep "DATABASE_URL" server/.env.example > /dev/null && echo "✅ DATABASE_URL configured" >> $GITHUB_STEP_SUMMARY
          grep "JWT_ACCESS_SECRET" server/.env.example > /dev/null && echo "✅ JWT_ACCESS_SECRET configured" >> $GITHUB_STEP_SUMMARY
          grep "GOOGLE_SHEETS" server/.env.example > /dev/null && echo "✅ Google Sheets integration ready" >> $GITHUB_STEP_SUMMARY

  # ─── Staging Environment Simulation ────────────────────────────────────────
  staging-sim:
    name: Staging Environment Simulation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kort
          POSTGRES_PASSWORD: kort_secret
          POSTGRES_DB: kort_db_staging
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: server
        run: pnpm run build

      - name: Test production configuration
        working-directory: server
        env:
          DATABASE_URL: postgresql://kort:kort_secret@localhost:5432/kort_db_staging
          NODE_ENV: production
          PORT: 8000
        run: |
          echo "### 🌐 Production Build Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend built successfully" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/index.js >> $GITHUB_STEP_SUMMARY

      - name: Verify database migrations
        working-directory: server
        env:
          DATABASE_URL: postgresql://kort:kort_secret@localhost:5432/kort_db_staging
        run: |
          echo "### 🗄️ Database Migration Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pnpm run db:status >> $GITHUB_STEP_SUMMARY 2>&1 || true

  # ─── API Endpoint Verification ────────────────────────────────────────────
  api-endpoints:
    name: API Endpoints Verification
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kort
          POSTGRES_PASSWORD: kort_secret
          POSTGRES_DB: kort_db_staging
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Setup database
        working-directory: server
        env:
          DATABASE_URL: postgresql://kort:kort_secret@localhost:5432/kort_db_staging
        run: pnpm run db:push

      - name: Build backend
        working-directory: server
        run: pnpm run build

      - name: Start backend
        working-directory: server
        env:
          DATABASE_URL: postgresql://kort:kort_secret@localhost:5432/kort_db_staging
          PORT: 8000
          NODE_ENV: production
          JWT_ACCESS_SECRET: "test-secret-key-for-ci-only-min32chars!!"
          JWT_REFRESH_SECRET: "test-refresh-key-for-ci-only-min32chars!!"
          CORS_ORIGIN: "http://localhost:5173"
        run: |
          node dist/index.js &
          sleep 5

      - name: Test API endpoints
        run: |
          echo "### 🔌 API Endpoints Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Test backend health
          curl -s http://localhost:8000/api/v1/health || echo "⚠️ Health endpoint not available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ API endpoint verification completed" >> $GITHUB_STEP_SUMMARY

  # ─── Deployment Gate ──────────────────────────────────────────────────────
  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [deploy-ready, env-config, staging-sim, api-endpoints]
    if: always()
    steps:
      - name: Check deployment gate
        run: |
          if [ "${{ needs.deploy-ready.result }}" = "failure" ] || \
             [ "${{ needs.staging-sim.result }}" = "failure" ] || \
             [ "${{ needs.api-endpoints.result }}" = "failure" ]; then
            echo "❌ Deployment gate failed"
            exit 1
          fi
          echo "✅ Deployment gate passed - ready for production"
