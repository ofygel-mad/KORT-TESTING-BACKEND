<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapan Warehouse – Calm Enterprise</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#f7f5f0;--surface:#fff;--surface-inset:#faf8f4;--surface-muted:#f1eee8;
  --border:#e5dfd5;--border-soft:#ede8e0;--border-strong:#d9d0c3;
  --text:#1d1b18;--text-2:#5a5550;--text-3:#8b837a;--text-4:#b0a89e;
  --accent:#8a6a42;--accent-h:#755833;--accent-l:rgba(138,106,66,.11);
  --ok:#4f7a5a;--ok-l:rgba(79,122,90,.11);--ok-b:rgba(79,122,90,.2);
  --warn:#a87932;--warn-l:rgba(168,121,50,.11);--warn-b:rgba(168,121,50,.2);
  --err:#a14d42;--err-l:rgba(161,77,66,.11);--err-b:rgba(161,77,66,.2);
  --info:#5a7a94;--info-l:rgba(90,122,148,.11);
  --r:12px;--r-sm:8px;--r-xs:6px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"JetBrains Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body,#root{width:100%;height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;font-size:14px;}

/* SHELL */
.shell{display:flex;height:100vh;overflow:hidden;}

/* CHAPAN SIDEBAR */
.chapan-nav{width:252px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.chapan-brand{padding:20px;border-bottom:1px solid var(--border);}
.chapan-brand-tag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px;}
.chapan-brand-name{font-size:16px;font-weight:600;color:var(--text);}
.chapan-brand-sub{font-size:11px;color:var(--text-3);margin-top:2px;}
.chapan-links{flex:1;padding:6px 0;}
.chapan-link{display:flex;align-items:center;gap:9px;width:100%;padding:9px 20px;background:none;border:none;border-left:2px solid transparent;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text-2);text-align:left;transition:all 120ms;}
.chapan-link:hover{background:var(--surface-muted);color:var(--text);}
.chapan-link.active{background:var(--accent-l);color:var(--accent);border-left-color:var(--accent);}

/* MAIN */
.wh-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* PAGE HEADER */
.wh-page-header{padding:16px 24px 0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.wh-page-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:12px;}
.wh-toolbar{display:flex;align-items:center;gap:8px;padding-bottom:12px;flex-wrap:nowrap;overflow:visible;}
.wh-page-header{padding:16px 24px 0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow:visible;}

/* TOOLBAR CONTROLS */
.tb-search{flex:1;min-width:160px;max-width:260px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface-inset);font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 120ms;}
.tb-search:focus{border-color:var(--accent);}
.tb-search::placeholder{color:var(--text-4);}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:var(--surface-inset);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all 120ms;flex-shrink:0;}
.tb-btn:hover{border-color:var(--border-strong);color:var(--text);}
.tb-btn.primary{background:var(--text);color:var(--surface);border-color:var(--text);}
.tb-btn.primary:hover{background:#2a2621;}
.tb-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-l);}
.tb-divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}

/* DROPDOWN */
.dd-wrap{position:relative;flex-shrink:0;z-index:100;}
.dd-menu{position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);box-shadow:0 8px 24px rgba(29,27,24,.12);z-index:999;padding:4px;min-width:200px;}
.dd-menu.right{left:auto;right:0;}
.dd-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-radius:var(--r-xs);font-size:13px;color:var(--text-2);cursor:pointer;transition:background 100ms;}
.dd-item:hover{background:var(--surface-muted);}
.dd-item.active{background:var(--accent-l);color:var(--accent);font-weight:500;}
.dd-item-label{display:flex;flex-direction:column;gap:1px;}
.dd-item-sub{font-size:11px;opacity:.6;font-weight:400;}
.dd-item-count{font-size:11px;color:var(--text-3);font-family:var(--mono);}
.dd-item.active .dd-item-count{color:var(--accent);opacity:.7;}

/* SECTION TABS */
.section-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;flex-shrink:0;gap:0;overflow-x:auto;}
.section-tabs::-webkit-scrollbar{display:none;}
.s-tab{padding:12px 16px;background:none;border:none;border-bottom:2px solid transparent;font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all 120ms;}
.s-tab:hover{color:var(--text);}
.s-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.s-tab .tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;background:var(--surface-muted);border-radius:8px;font-size:10px;font-weight:600;color:var(--text-3);margin-left:5px;}
.s-tab.active .tab-badge{background:var(--accent-l);color:var(--accent);}

/* STATS */
.stats-row{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.stat-tile{flex:1;padding:14px 20px;border-right:1px solid var(--border);}
.stat-tile:last-child{border-right:none;}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:3px;}
.stat-val{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1;}
.stat-note{font-size:11px;color:var(--text-3);margin-top:2px;}

/* CONTENT SCROLL */
.content-scroll{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;}

/* PRODUCT TREE (Catalog) */
.list-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.list-mode-btn{padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-xs);font-size:12px;font-weight:500;color:var(--text-2);cursor:pointer;font-family:var(--font);transition:all 120ms;}
.list-mode-btn:hover{border-color:var(--border-strong);color:var(--text);}
.list-mode-btn.active{background:var(--accent-l);border-color:var(--accent);color:var(--accent);}

.product-tree{display:flex;flex-direction:column;gap:6px;}
.product-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.product-row{display:flex;align-items:center;gap:10px;padding:0 16px;height:46px;cursor:pointer;user-select:none;transition:background 120ms;}
.product-row:hover{background:var(--surface-muted);}
.chevron{flex-shrink:0;width:16px;height:16px;display:flex;align-items:center;justify-content:center;color:var(--text-3);transition:transform 160ms cubic-bezier(.16,1,.3,1);}
.chevron.open{transform:rotate(90deg);}
.p-icon{width:22px;height:22px;border-radius:5px;background:var(--surface-muted);border:1px solid var(--border-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-3);}
.p-name{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.p-qty{font-size:12px;color:var(--text-3);font-family:var(--mono);}
.product-expanded{border-top:1px solid var(--border);}

/* COMPACT */
.product-card.compact .product-row{height:36px;}
.product-card.compact .p-icon{display:none;}
.product-card.compact .p-name{font-size:13px;}

/* SUBGROUP */
.subgroup{border-bottom:1px solid var(--border-soft);}
.subgroup:last-child{border-bottom:none;}
.sg-header{display:flex;align-items:center;gap:8px;padding:0 16px 0 36px;height:38px;cursor:pointer;background:var(--surface-inset);transition:background 120ms;}
.sg-header:hover{background:var(--surface-muted);}
.sg-chev{width:13px;height:13px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-4);transition:transform 140ms;}
.sg-chev.open{transform:rotate(90deg);}
.sg-label{flex:1;font-size:12px;font-weight:500;color:var(--text-2);}
.sg-total-lbl{font-size:11px;color:var(--text-4);margin-right:3px;}
.sg-total{font-size:12px;font-family:var(--mono);color:var(--text-3);}
.detail-rows{background:var(--bg);padding:6px 16px 6px 52px;display:flex;flex-direction:column;gap:1px;}
.d-row{display:flex;align-items:center;gap:10px;height:34px;border-radius:var(--r-xs);padding:0 8px;cursor:pointer;transition:background 120ms;}
.d-row:hover{background:var(--surface-muted);}
.d-arrow{font-size:10px;color:var(--text-4);flex-shrink:0;}
.d-attr{flex:1;font-size:13px;color:var(--text-2);}
.d-val{font-size:13px;font-weight:600;color:var(--text);font-family:var(--mono);}
.d-act{padding:2px 8px;background:none;border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text-3);cursor:pointer;font-family:var(--font);transition:all 120ms;}
.d-act:hover{border-color:var(--accent);color:var(--accent);}

/* SKU INLINE TABLE */
.sku-inline{background:var(--bg);border-top:1px solid var(--border-soft);}
.sku-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;}
.sku-tbl th{padding:8px 12px 8px 52px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);background:var(--bg);border-bottom:1px solid var(--border-soft);}
.sku-tbl th.r{text-align:right;padding-right:16px;}
.sku-tbl td{padding:9px 12px 9px 52px;border-bottom:1px solid var(--border-soft);color:var(--text-2);vertical-align:middle;}
.sku-tbl td.r{text-align:right;padding-right:16px;font-variant-numeric:tabular-nums;font-family:var(--mono);font-weight:500;color:var(--text);}
.sku-tbl td.mono{font-family:var(--mono);font-size:11px;color:var(--text);}
.sku-tbl td.p{color:var(--text);font-weight:500;}
.sku-tbl tbody tr:last-child td{border-bottom:none;}
.sku-tbl tbody tr:hover td{background:var(--surface-muted);}

/* FLAT SKU TABLE */
.flat-tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.flat-tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;}
.flat-tbl th{padding:10px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);background:var(--surface-inset);border-bottom:1px solid var(--border);}
.flat-tbl th.r{text-align:right;}
.flat-tbl td{padding:11px 16px;border-bottom:1px solid var(--border-soft);color:var(--text-2);vertical-align:middle;}
.flat-tbl td.p{color:var(--text);font-weight:500;}
.flat-tbl td.mono{font-family:var(--mono);font-size:12px;color:var(--text);}
.flat-tbl td.r{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--mono);font-weight:500;color:var(--text);}
.flat-tbl td.muted{color:var(--text-3);font-size:12px;}
.flat-tbl tbody tr:last-child td{border-bottom:none;}
.flat-tbl tbody tr:hover td{background:var(--surface-muted);}

/* STATUS CHIPS */
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid;}
.chip-ok{background:var(--ok-l);color:var(--ok);border-color:var(--ok-b);}
.chip-warn{background:var(--warn-l);color:var(--warn);border-color:var(--warn-b);}
.chip-err{background:var(--err-l);color:var(--err);border-color:var(--err-b);}
.chip-info{background:var(--info-l);color:var(--info);border-color:rgba(90,122,148,.2);}

/* SECTION CARD */
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.sec-card-head{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface-inset);display:flex;align-items:center;justify-content:space-between;}
.sec-card-title{font-size:14px;font-weight:600;color:var(--text);}
.sec-card-sub{font-size:12px;color:var(--text-3);margin-top:2px;}
.sec-card-body{padding:16px;}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);}
.form-input,.form-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface-inset);font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 120ms;width:100%;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text-4);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;border:none;cursor:pointer;font-family:var(--font);transition:all 120ms;width:100%;}
.btn-primary{background:var(--text);color:var(--surface);}
.btn-primary:hover{background:#2a2621;}
.btn-ok{background:var(--ok);color:#fff;}
.btn-ok:hover{opacity:.88;}
.btn-warn{background:var(--warn);color:#fff;}
.btn-warn:hover{opacity:.88;}
.btn-ghost{background:var(--surface-inset);border:1px solid var(--border);color:var(--text-2);}
.btn-ghost:hover{border-color:var(--border-strong);color:var(--text);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:5px;width:auto;}

/* IMPORT ZONE */
.import-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 160ms;text-align:center;}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-l);}
.upload-zone.done{border-color:var(--ok);background:var(--ok-l);border-style:solid;}
.upload-icon{font-size:28px;opacity:.4;}
.upload-title{font-size:14px;font-weight:600;color:var(--text);}
.upload-desc{font-size:12px;color:var(--text-3);}
.upload-hint{font-size:11px;color:var(--text-4);}
.status-row{display:flex;align-items:center;gap:16px;padding:10px 14px;background:var(--ok-l);border:1px solid var(--ok-b);border-radius:var(--r-sm);font-size:12px;color:var(--ok);font-weight:500;}

/* LIVE FEED */
.feed-item{display:flex;align-items:flex-start;gap:12px;padding:10px 12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);}
.feed-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);flex-shrink:0;margin-top:4px;}
.feed-type{font-size:13px;font-weight:500;color:var(--text);}
.feed-id{font-size:11px;color:var(--text-3);font-family:var(--mono);}
.feed-time{font-size:11px;color:var(--text-3);margin-left:auto;flex-shrink:0;}

/* ALERT CARD */
.alert-card{padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);}
.alert-card-level{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.alert-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.alert-card-desc{font-size:12px;color:var(--text-3);}

/* MINI CARD */
.mini-card{padding:12px 14px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface-inset);}
.mini-card-label{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px;}
.mini-card-val{font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--text);}
.mini-card-note{font-size:11px;color:var(--text-3);margin-top:2px;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:48px 20px;color:var(--text-3);text-align:center;}
.empty-icon{font-size:32px;opacity:.2;}
.empty-title{font-size:14px;font-weight:600;color:var(--text-2);}
.empty-text{font-size:13px;max-width:280px;line-height:1.6;}

/* RESPONSIVE */
@media(max-width:900px){
  .chapan-nav{width:220px;}
  .stats-row{overflow-x:auto;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .import-grid{grid-template-columns:1fr;}
}
@media(max-width:640px){
  .chapan-nav{display:none;}
  .wh-page-header{padding:12px 16px 0;}
  .content-scroll{padding:12px 16px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

/* ── MOCK DATA ── */
const SITES = [

const PRODUCTS = [

const SKU_ROWS = [
  {id:'k1',product:'Абай бомбер',color:'Белый',size:'42',length:'Короткий',onHand:5,reserved:2,available:3,status:'ok'},
  {id:'k2',product:'Абай бомбер',color:'Белый',size:'44',length:'Длинный',onHand:7,reserved:0,available:7,status:'ok'},

  {id:'k5',product:'Абайка лен',color:'Коричневый',size:'44',length:'—',onHand:6,reserved:0,available:6,status:'ok'},
  {id:'k6',product:'Абай шапаны',color:'Серый',size:'46',length:'—',onHand:2,reserved:2,available:0,status:'err'},

                <div className="dd-menu" onClick={e=>e.stopPropagation()}>
                  {statusOptions.map(opt=>(
                    <div key={opt.id} className={`dd-item${statusFilter===opt.id?' active':''}`} onClick={()=>{setStatusFilter(opt.id);setFilterOpen(false);}}>
                      <span>{opt.label}</span><span className="dd-item-count">{opt.count}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* VIEW */}
            <div className="dd-wrap">
              <button className={`tb-btn${(viewMode!=='default'||listMode!=='tree')?' active':''}`} onClick={e=>{e.stopPropagation();setFilterOpen(false);setViewOpen(v=>!v);}}>
                Вид <span style={{fontSize:9,opacity:.5}}>{viewOpen?'▲':'▼'}</span>
              </button>
              {viewOpen&&(
                <div className="dd-menu" onClick={e=>e.stopPropagation()}>
                  <div style={{padding:'6px 10px 4px',fontSize:10,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--text-3)'}}>Отображение</div>
                  {[{id:'tree',label:'Каталог',sub:'Дерево с раскрытием'},{id:'sku',label:'по SKU',sub:'Все позиции сразу'}].map(opt=>(
                    <div key={opt.id} className={`dd-item${listMode===opt.id?' active':''}`} onClick={()=>{setListMode(opt.id);setViewOpen(false);}}>
                      <div className="dd-item-label"><span>{opt.label}</span><span className="dd-item-sub">{opt.sub}</span></div>
                    </div>
                  ))}
                  <div style={{height:1,background:'var(--border)',margin:'4px 0'}}/>
                  <div style={{padding:'6px 10px 4px',fontSize:10,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--text-3)'}}>Плотность</div>
                  {[{id:'default',label:'Стандартный',sub:'Карточки с иконками'},{id:'compact',label:'Компактный',sub:'Плотный список'}].map(opt=>(
                    <div key={opt.id} className={`dd-item${viewMode===opt.id?' active':''}`} onClick={()=>{setViewMode(opt.id);setViewOpen(false);}}>
                      <div className="dd-item-label"><span>{opt.label}</span><span className="dd-item-sub">{opt.sub}</span></div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="tb-divider"/>
            <button className="tb-btn" onClick={()=>setStatsOpen(v=>!v)}>{statsOpen?'Скрыть метрики':'Показать метрики'}</button>
            <button className="tb-btn primary">+ Добавить товар</button>
            <button className="tb-btn">Экспорт</button>
          </div>
        </div>

        {/* STATS (optional) */}
        {statsOpen&&(
          <div className="stats-row">
            <div className="stat-tile"><div className="stat-label">Позиций в каталоге</div><div className="stat-val">{PRODUCTS.length}</div><div className="stat-note">уникальных товаров</div></div>
            <div className="stat-tile"><div className="stat-label">Единиц всего</div><div className="stat-val">{totalQty}</div><div className="stat-note">на складе</div></div>
            <div className="stat-tile"><div className="stat-label">Зарезервировано</div><div className="stat-val">{totalReserved}</div><div className="stat-note">по активным резервам</div></div>
            <div className="stat-tile"><div className="stat-label">Доступно</div><div className="stat-val">{totalAvail}</div><div className="stat-note">готово к отправке</div></div>
          </div>
        )}

        {/* CONTENT */}
        <div className="content-scroll">
          <CatalogSection search={search} viewMode={viewMode} listMode={listMode}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
